<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Countdown</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #00ff00, #800080, #ff0000);
            color: white;
            text-align: center;
            background-image: url('celebration-image.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            margin: 0;
            padding: 0;
            position: relative;
        }
        .rainbow {
            font-size: 3em;
            background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .countdown {
            font-size: 2em;
            margin-top: 20px;
        }
        .confetti {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }
        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            opacity: 0.9;
            animation: fall 5s infinite;
        }
        @keyframes fall {
            0% {transform: translateY(0);} 100% {transform: translateY(100vh) rotate(360deg);}
        }
    </style>
</head>
<body>
    <h1 class="rainbow">Birthday Countdown</h1>
    <div class="countdown" id="countdown"></div>
    <button id="whatsappShare" style="margin-top: 20px; padding: 10px 20px; font-size: 1em;">Share on WhatsApp</button>
    <audio controls autoplay loop>
        <source src="birthday-music.mp3" type="audio/mpeg">
        Your browser does not support the audio tag.
    </audio>
    <div class="confetti" id="confettiContainer"></div>
    <script>
        const countdownDate = new Date('2026-05-08T18:00:00Z').getTime();
        const countdownDisplay = document.getElementById('countdown');
        const whatsappShare = document.getElementById('whatsappShare');

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = countdownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            countdownDisplay.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;

            if (distance < 0) {
                clearInterval(interval);
                countdownDisplay.innerHTML = "It's your birthday!";
            }
        }

        let interval = setInterval(updateCountdown, 1000);

        whatsappShare.addEventListener('click', () => {
            const message = encodeURIComponent('Join me for my birthday celebration!');
            const url = encodeURIComponent(window.location.href);
            window.open(`https://api.whatsapp.com/send?text=${message} ${url}`, '_blank');
        });

        // Generate confetti
        function createConfetti() {
            const confettiContainer = document.getElementById('confettiContainer');
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti-piece');
                confetti.style.backgroundColor = '#' + Math.floor(Math.random() * 16777215).toString(16);
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.animationDuration = Math.random() * 3 + 2 + 's';
                confettiContainer.appendChild(confetti);
            }
        }
        createConfetti();
    </script>
</body>
</html>
