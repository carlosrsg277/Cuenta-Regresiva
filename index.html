<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Countdown</title>
    <style>
        body {
            background-image: url('background-image-url-here'); /* Add your background image URL */
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            flex-direction: column;
            color: white;
            font-family: 'Arial', sans-serif;
        }

        .countdown {
            font-size: 3em;
            text-shadow: 0 0 10px black;
            margin: 20px;
            animation: confetti 1s linear infinite; /* Placeholder for confetti animation */
        }

        @keyframes confetti {
            /* Example animation, you’ll need to implement your own confetti code */
        }

        footer {
            position: fixed;
            bottom: 10px;
            text-align: center;
        }
    </style>
</head>

<body>
    <h1>Countdown to My Birthday!</h1>
    <div class="countdown" id="countdown"></div>
    <audio controls loop>
        <source src="background-music-url-here" type="audio/mpeg"> <!-- Background music URL -->
        Your browser does not support the audio element.
    </audio>
    <footer>
        <a href="https://wa.me/?text=Join%20me%20for%20my%20birthday%20countdown!" target="_blank">Share on WhatsApp</a>
    </footer>

    <script>
        const countdownElement = document.getElementById('countdown');
        const countdownDate = new Date('2026-05-08T18:00:00Z').getTime();

        const updateCountdown = () => {
            const now = new Date().getTime();
            const distance = countdownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            countdownElement.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;

            if (distance < 0) {
                clearInterval(interval);
                countdownElement.innerHTML = "It's my birthday!";
            }
        };

        const interval = setInterval(updateCountdown, 1000);
    </script>
</body>

</html>
