<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Countdown</title>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            height: 100vh;
            background-color: #f0f0f0;
            color: #333;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        h1 {
            font-size: 2.5rem;
            margin: 0;
        }
        #countdown {
            font-size: 3rem;
            margin: 20px 0;
        }
        .confetti {
            position: absolute;
            width: 5px;
            height: 5px;
            opacity: 0.7;
            animation: fall linear;
        }
        @keyframes fall {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }
        #music {
            margin-top: 20px;
        }
        .rainbow {
            position: relative;
            background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <h1 class="rainbow">Countdown to My Birthday!</h1>
    <div id="countdown"></div>
    <button id="shareBtn">Share on WhatsApp</button>
    <audio id="music" src="path_to_your_background_music.mp3" loop></audio>
    <script>
        const countdownDate = new Date('2026-05-08T18:00:00Z').getTime();
        const countdownDisplay = document.getElementById('countdown');
        const shareButton = document.getElementById('shareBtn');
        const audio = document.getElementById('music');

        shareButton.addEventListener('click', () => {
            const url = encodeURIComponent(window.location.href);
            const message = encodeURIComponent('Join me for my birthday countdown!');
            window.open(`https://wa.me/?text=${message} ${url}`, '_blank');
        });

        function startCountdown() {
            const now = new Date().getTime();
            const distance = countdownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            countdownDisplay.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;

            if (distance < 0) {
                countdownDisplay.innerHTML = 'Happy Birthday!';
                clearInterval(timer);
                launchConfetti();
            }
        }

        function launchConfetti() {
            for (let i = 0; i < 100; i++) {
                createConfetti();
            }
            audio.play();
        }

        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.backgroundColor = randomColor();
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.animationDuration = Math.random() * 2 + 2 + 's';
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 4000);
        }

        function randomColor() {
            const colors = ['red', 'orange', 'yellow', 'green', 'blue', 'indigo', 'violet'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        const timer = setInterval(startCountdown, 1000);
    </script>
</body>
</html>
